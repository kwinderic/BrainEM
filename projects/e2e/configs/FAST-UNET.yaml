SYSTEM:
  # NUM_GPUS: 2
  # NUM_CPUS: 4
  NUM_GPUS: 1
  NUM_CPUS: 4
SOLVER:
  NAME: Adam
  LR_SCHEDULER_NAME: WarmupCosineLR
  BASE_LR: 0.0001
  ITERATION_STEP: 1
  ITERATION_SAVE: 10000
  ITERATION_TOTAL: 100000     # ~ 200k x 2 x 1GPU
  ITERATION_VAL: 500000000000000000000000000000000000000000000
  SAMPLES_PER_BATCH: 2
  CLIP_GRADIENTS:
    ENABLED: True
    CLIP_TYPE: "norm"
    CLIP_VALUE: 1.0
MODEL:
  ARCHITECTURE: fast_unet_3d
  BLOCK_TYPE: residual
  # TARGET_OPT: ["2", "9-32"]   # affinity use 3 channels (by default), DCL use 32
  TARGET_OPT: ["9-1"]     # 9: original label
DATASET:
  OUTPUT_PATH: outputs/AC3-AC4/res_unet
INFERENCE:
  OUTPUT_PATH: outputs/AC3-AC4/res_unet/test
  INPUT_SIZE: [17, 257, 257]
  OUTPUT_SIZE: [17, 257, 257]


# self.crop_size = [18, 160, 160]
# self.net_padding = [0, 0, 0]


# # Type of gradient clipping, currently 2 values are supported:
# # - "value": the absolute values of elements of each gradients are clipped
# # - "norm": the norm of the gradient for each parameter is clipped thus
# #   affecting all elements in the parameter
# _C.SOLVER.CLIP_GRADIENTS.CLIP_TYPE = "value"
# # Maximum absolute value used for clipping gradients
# _C.SOLVER.CLIP_GRADIENTS.CLIP_VALUE = 1.0
# # Floating point number p for L-p norm to be used with the "norm"
# # gradient clipping type; for L-inf, please specify .inf
# _C.SOLVER.CLIP_GRADIENTS.NORM_TYPE = 2.0