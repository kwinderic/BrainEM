SYSTEM:
  NUM_GPUS: 1
  NUM_CPUS: 4
SOLVER:
  NAME: Adam
  LR_SCHEDULER_NAME: WarmupCosineLR
  BASE_LR: 0.0001
  ITERATION_STEP: 1
  ITERATION_SAVE: 10000
  ITERATION_TOTAL: 100000
  ITERATION_VAL: 10000
  SAMPLES_PER_BATCH: 2
MODEL:
  # ARCHITECTURE: 'prior_enhanced_unet_3d'
  ARCHITECTURE: 'unet_3d'
  BLOCK_TYPE: 'residual'
  FILTERS: [28, 36, 48, 64, 80]
  BLOCKS: [2, 2, 2, 2]    # only useful for FPN
  INPUT_SIZE: [18, 160, 160]
  OUTPUT_SIZE: [18, 160, 160]
DATASET:
  OUTPUT_PATH: outputs/AC3-AC4/res_unet
  PAD_SIZE: [0,0,0]
INFERENCE:
  OUTPUT_PATH: outputs/AC3-AC4/res_unet/test
  INPUT_SIZE: [18, 160, 160]
  OUTPUT_SIZE: [18, 160, 160]
  STRIDE: [10, 80, 80]
  PAD_SIZE: [4, 48, 48]
MONITOR:
  WANDB_PROJECT: "Baselines"
  